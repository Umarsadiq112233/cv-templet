name: cv_builder
description: A professional CV/Resume builder Flutter application with multiple templates and PDF export.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  hive_flutter: ^1.1.0
  pdf: ^3.10.8
  printing: ^5.12.0
  go_router: ^13.2.0
  google_fonts: ^6.2.1
  image_picker: ^1.0.7
  share_plus: ^7.2.2
  uuid: ^4.3.3
  path_provider: ^2.1.3
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  font_awesome_flutter: ^10.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/onboarding/
